<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>決済完了 — PayPal SDK v6 Demo</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body style="background: var(--paypal-light);">

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <svg width="90" height="22" viewBox="0 0 90 22"><text x="0" y="18" font-size="18" font-weight="700" fill="#ffffff" font-family="Arial">PayPal</text></svg>
        <span class="demo-badge">SDK v6 Demo</span>
      </div>
    </div>
  </header>

  <main class="success-page">
    <div class="success-icon">✅</div>
    <h1 class="success-title">決済が完了しました</h1>
    <p class="success-sub">ご購入ありがとうございます。</p>

    <div class="success-details" id="details-card">
      <div class="detail-row">
        <span class="detail-label">注文ID</span>
        <span class="detail-value" id="val-orderId">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">キャプチャID</span>
        <span class="detail-value" id="val-captureId">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">金額</span>
        <span class="detail-value" id="val-amount">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">購入者名</span>
        <span class="detail-value" id="val-payerName">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">メール</span>
        <span class="detail-value" id="val-payerEmail">—</span>
      </div>
    </div>

    <a href="/" class="btn btn-primary" style="text-decoration:none; display:inline-flex;">
      ← チェックアウトに戻る
    </a>
  </main>

  <script>
    // URL パラメーターから決済情報を表示する
    const p = new URLSearchParams(location.search);
    const set = (id, val) => {
      const el = document.getElementById(id);
      if (el) el.textContent = val || "—";
    };
    set("val-orderId",    p.get("orderId"));
    set("val-captureId",  p.get("captureId"));
    set("val-amount",     p.get("amount") ? `$${p.get("amount")} ${p.get("currency") || "USD"}` : null);
    set("val-payerName",  p.get("payerName"));
    set("val-payerEmail", p.get("payerEmail"));
  </script>
</body>
</html>
